name: Weekly activity import

on:
  schedule:
    - cron: '15 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
      EVENTBRITE_PAGE_CONCURRENCY: '1'
      EVENTBRITE_DETAIL_CONCURRENCY: '1'
      EVENTBRITE_PAGE_DELAY_MS: '1800'
      EVENTBRITE_DETAIL_DELAY_MS: '1000'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Discover and apply new activities
        run: npm run activities:weekly:apply

      - name: Upload import audit and SQL
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-activity-import-${{ github.run_id }}
          path: |
            data/weekly-imports/
            data/eventbrite_london_baby_*.generated.json
            data/fever_london_family_*.generated.json
            data/google-places-e10-10-miles.generated.json
            supabase/seed/activities_eventbrite_london_baby_*.generated.sql
            supabase/seed/activities_fever_london_family_*.generated.sql
            supabase/seed/activities_google_places_e10_10_miles.generated.sql
          if-no-files-found: warn
